      title: Ai Studio API
      version: "1.0.0"
      description: Lokale Steuerung für mehrere GPU-Stacks auf Vast.ai.
    
    servers:
      - url: http://localhost:None
        description: Local development server
    
    paths:
      /health:
        get:
          summary: Health check
          operationId: healthCheck
          responses:
            '200':
              description: Service is healthy
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      status:
                        type: string
                        example: healthy
