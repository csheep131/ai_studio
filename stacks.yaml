presets:
  chat:
    description: Chat / Conversational AI
    stack: text
    model: cesarsal1nas/Huihui-Qwen3.5-35B-A3B-abliterated-Q4_K_M-GGUF
    notes: "Gut f\xFCr allgemeine Chat-Aufgaben"
  coding:
    description: Coding Assistant
    stack: text_pro
    model: huihui-ai/Huihui-Qwen3.5-122B-A10B-abliterated-GGUF
    notes: "Benötigt H100/H200/B200 oder A100/A800 80GB GPU, ideal für Code-Generierung und Reasoning"
  image-fast:
    description: Schnelle Bild-Generierung
    stack: image
    model: stabilityai/stable-diffusion-xl-base-1.0
    notes: "SDXL f\xFCr schnelle Ergebnisse"
  image-prompt-quality:
    description: "High-Quality Text-to-Image"
    stack: image_prompt
    model: black-forest-labs/FLUX.2-dev
    min_vram_mb: 49152
    notes: "FLUX.2-dev f\xFCr beste Prompt-Umsetzung und Details"
  video-quality:
    description: "Hohe Video-Qualit\xE4t"
    stack: video
    model: Wan-AI/Wan2.1-T2V-14B-Diffusers
    min_vram_mb: 81920
    notes: "Beste Qualit\xE4t, ben\xF6tigt 80GB+ VRAM"
  video-cheap:
    description: "G\xFCnstige Video-Generierung"
    stack: video
    model: Wan-AI/Wan2.1-T2V-14B-Diffusers
    max_dph: 3.0
    notes: "Sucht g\xFCnstigste verf\xFCgbare GPU"
  video-lora-quality:
    description: "Video mit LoRA"
    stack: video_lora
    model: Wan-AI/Wan2.1-T2V-14B-Diffusers
    min_vram_mb: 81920
    notes: "Wan2.1 mit LoRA-Auswahl, H100+ und mehr Disk"
  opus_chat:
    description: Qwen3.5-27B Claude-4.6-Opus Uncensored Chat
    stack: qwen_opus
    model: LuffyTheFox/Qwen3.5-27B-Claude-4.6-Opus-Uncensored-V2-Kullback-Leibler-GGUF
    notes: "Kostengünstig auf RTX 5090/6000/4090 mit TurboQuant, 262K Context"
